
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>토지 지도 뷰어</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@7.5.2/ol.css">
<script src="https://cdn.jsdelivr.net/npm/ol@7.5.2/dist/ol.js"></script>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

#map{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:15px;
left:15px;
z-index:1000;
background:#0f1b2e;
color:white;
padding:15px;
border-radius:10px;
width:260px;
}

.panel input{
width:100%;
padding:8px;
margin-top:5px;
}

.panel button{
margin-top:8px;
width:100%;
padding:8px;
cursor:pointer;
}

.title{
font-size:18px;
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="panel">

<div class="title">토지 지도</div>

<div>주소 / 지번 검색</div>
<input id="addr" placeholder="예: 서울 중구 세종대로 110">

<button onclick="search()">위치 찾기</button>

</div>

<div id="map"></div>

<script>

var map = new ol.Map({
target: 'map',
layers: [
new ol.layer.Tile({
source: new ol.source.OSM()
})
],
view: new ol.View({
center: ol.proj.fromLonLat([127,37.5]),
zoom: 7
})
});

var markerLayer = new ol.layer.Vector({
source: new ol.source.Vector()
});

map.addLayer(markerLayer);

function search(){

let addr=document.getElementById("addr").value;

let url="https://nominatim.openstreetmap.org/search?format=json&q="+encodeURIComponent(addr);

fetch(url)
.then(res=>res.json())
.then(data=>{

if(data.length===0){
alert("검색 결과 없음");
return;
}

let lon=data[0].lon;
let lat=data[0].lat;

let coord=ol.proj.fromLonLat([lon,lat]);

map.getView().animate({
center:coord,
zoom:18
});

markerLayer.getSource().clear();

let marker=new ol.Feature({
geometry:new ol.geom.Point(coord)
});

markerLayer.getSource().addFeature(marker);

})
.catch(err=>{
alert("검색 실패");
console.log(err);
});

}

</script>

</body>
</html>
