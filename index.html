
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>브이월드 토지 지도 뷰어</title>

<style>
body{
margin:0;
font-family:Arial;
}

#map{
width:100%;
height:100vh;
}

.panel{
position:absolute;
top:15px;
left:15px;
z-index:1000;
background:#0f1b2e;
color:white;
padding:15px;
border-radius:10px;
width:260px;
}

.panel input{
width:100%;
padding:8px;
margin-top:5px;
}

.panel button{
margin-top:8px;
width:100%;
padding:8px;
cursor:pointer;
}

.title{
font-size:18px;
margin-bottom:10px;
}
</style>

</head>

<body>

<div class="panel">
<div class="title">브이월드 지도</div>

<div>VWorld API Key</div>
<input id="apikey" placeholder="여기에 API 키 입력">

<div style="margin-top:10px;">지번 검색</div>
<input id="addr" placeholder="예: 서울 중구 세종대로 110">

<button onclick="initMap()">지도 시작</button>
<button onclick="search()">위치 찾기</button>

</div>

<div id="map"></div>

<script>

var map;
var marker;

function initMap(){

var key=document.getElementById("apikey").value;

var script=document.createElement("script");
script.src="https://map.vworld.kr/js/vworldMapInit.js.do?apiKey="+key;

document.head.appendChild(script);

script.onload=function(){

map = new vw.Map("map", {
center: new vw.LatLng(37.5665,126.9780),
level: 8
});

}

}


function search(){

var addr=document.getElementById("addr").value;

var geocoder = new vw.Geocoder();

geocoder.addressSearch(addr,function(result,status){

if(status === vw.GeocoderStatus.OK){

var point=result[0].point;

var lat=point.y;
var lon=point.x;

var move=new vw.LatLng(lat,lon);

map.setCenter(move);
map.setLevel(2);

if(marker){
marker.setMap(null);
}

marker=new vw.Marker({
position:move,
map:map
});

}else{

alert("검색 실패");

}

});

}

</script>

</body>
</html>
